name: Update desk data + deploy dashboard

on:
  schedule:
    - cron: '0 11 * * *'     # zilnic 11:00 UTC (~14:00 RO vara / 13:00 iarna) — înainte de sesiunea NY; sâmbăta prinde COT-ul de vineri
  push:
    branches: [ main ]        # push-ul lui Claude/tău reîmprospătează site-ul
  workflow_dispatch: {}        # buton „Run workflow" (rulare manuală)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Datele de piață se reîmprospătează DOAR pe program / manual, nu la fiecare push
      - name: Refresh market data (COT + randamente + seasonality)
        if: github.event_name != 'push' || contains(github.event.head_commit.message, '[refresh]')
        continue-on-error: true
        run: python3 "Terminal Back-end/00_SYSTEM/scripts/update_data.py"

      - name: Commit datele proaspete
        if: github.event_name != 'push' || contains(github.event.head_commit.message, '[refresh]')
        run: |
          git config user.name  "desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "Terminal Back-end/00_SYSTEM/data" "Terminal Back-end/07_Dashboard/analysis_data.js"
          git commit -m "auto: refresh date piață $(date -u +%F) [skip ci]" || echo "nimic de comis"
          git pull --rebase origin main || true
          git push || echo "push omis"

      # Site public = doar research (fără journal_data.js). index.html = dashboard.
      - name: Build site
        run: |
          mkdir -p _site
          cp "Terminal Back-end/07_Dashboard"/*.html "Terminal Back-end/07_Dashboard"/*.js _site/ 2>/dev/null || true
          rm -f _site/journal_data.js
          cp "Terminal Back-end/07_Dashboard/dashboard.html" _site/index.html
          # cache-busting: fiecare deploy schimbă versiunea fișierelor .js
          sed -i "s/src=\"data.js\"/src=\"data.js?v=${GITHUB_RUN_ID}\"/g; s/src=\"analysis_data.js\"/src=\"analysis_data.js?v=${GITHUB_RUN_ID}\"/g; s/src=\"journal_data.js\"/src=\"journal_data.js?v=${GITHUB_RUN_ID}\"/g" _site/*.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
