<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>Padu Terminal — Bank Reports</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chrome"></div>

  <div class="kpis" id="kpis"></div>

  <div class="card">
    <h2>Bank Reports — fixed schema</h2>
    <div id="reports"></div>
    <div class="comment" id="rcomment" style="display:none"><b>Consensus, contradictions & position changes</b><span></span></div>
  </div>

  <div class="card">
    <h2>Per-currency read — what the commercial banks say</h2>
    <div class="grid2" id="ccys"></div>
  </div>

  <div class="pagesum" id="pagesum"></div>

<script src="data.js"></script>
<script src="analysis_data.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  renderChrome('p2');
  var D = window.ANALYSIS_DATA || {};
  var R = D.reports || [], M = D.reports_meta || {};

  // ——— KPI de triaj ———
  var changed = R.filter(function (r) { return /ÎNTORS|REVIZUIT/i.test(r.change || ''); }).length;
  var assets = {}; R.forEach(function (r) { (assets[r.asset] = assets[r.asset] || []).push(r); });
  var contra = Object.keys(assets).filter(function (a) {
    var dirs = {}; assets[a].forEach(function (r) { dirs[String(r.dir).toUpperCase()] = 1; });
    return dirs['BULLISH'] && dirs['BEARISH'];
  });
  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><span class="l">Reports processed</span><div class="v">' + (M.processed !== undefined ? M.processed : R.length) + '</div><div class="sub">' + (M.week || '') + '</div></div>' +
    '<div class="kpi"><span class="l">Excluded (triage)</span><div class="v">' + (M.excluded !== undefined ? M.excluded : '—') + '</div><div class="sub">irrelevant / duplicate</div></div>' +
    '<div class="kpi"><span class="l">Contradictions</span><div class="v">' + contra.length + '</div><div class="sub">' + (contra.join(', ') || 'none') + '</div></div>' +
    '<div class="kpi"><span class="l">Position changes</span><div class="v">' + changed + '</div><div class="sub">reversed / revised</div></div>';

  // ——— tabelul de rapoarte ———
  function convBar(n) {
    if (!n) return '<span class="dim">—</span>';
    var full = '', i;
    for (i = 1; i <= 5; i++) full += (i <= n ? '●' : '○');
    return '<span title="conviction ' + n + '/5">' + full + '</span>';
  }
  function chgBadge(c) {
    if (!c) return '<span class="dim">—</span>';
    var u = c.toUpperCase();
    var cls = /ÎNTORS/.test(u) ? 'b-watch' : /NOU/.test(u) ? 'b-long' : /SLĂBIT|INVALIDAT/.test(u) ? 'b-short' : 'b-flat';
    return '<span class="badge ' + cls + '">' + c + '</span>';
  }
  document.getElementById('reports').innerHTML = R.length
    ? '<table><tr><th>Bank</th><th>Date</th><th>Asset</th><th>Direction</th><th>Horizon</th><th>Conviction</th><th>Key arguments</th><th>Levels</th><th>Invalidation</th><th>vs. prior</th></tr>' +
      R.map(function (r) {
        var contraFlag = contra.indexOf(r.asset) > -1;
        return '<tr>' +
          '<td><b>' + r.bank + '</b></td>' +
          '<td class="small">' + (r.date || '—') + '</td>' +
          '<td>' + r.asset + (contraFlag ? ' <span class="badge b-watch" title="banks in contradiction on this asset">⚔</span>' : '') + '</td>' +
          '<td>' + dirBadge(r.dir) + '</td>' +
          '<td class="small">' + (r.horizon || '—') + '</td>' +
          '<td>' + convBar(r.conviction) + '</td>' +
          '<td class="small">' + ((r.args || []).join(' · ') || '—') + '</td>' +
          '<td class="small">' + (r.levels || '—') + '</td>' +
          '<td class="small">' + (r.invalidation || '—') + '</td>' +
          '<td>' + chgBadge(r.change) + '</td>' +
        '</tr>'; }).join('') + '</table>'
    : '<div class="empty">Se populează la „procesează inbox".</div>';

  var rc = (D.comments || {}).reports;
  if (rc) { var el = document.getElementById('rcomment'); el.style.display = 'block'; el.querySelector('span').textContent = rc; }

  // ——— per monedă ———
  var cy = D.currencies || {};
  var CORD = ['USD', 'EUR', 'GBP', 'CAD', 'JPY', 'CHF', 'AUD', 'NZD'];
  document.getElementById('ccys').innerHTML = Object.keys(cy).length
    ? CORD.filter(function (k) { return cy[k]; }).map(function (k) {
        var c = cy[k];
        return '<div class="ccy">' +
          '<div class="hd"><h3>' + k + '</h3><span class="tag">' + (c.core ? 'CORE' : 'SECONDARY') + '</span>' + dirBadge(c.bias) + '</div>' +
          '<div class="blk" style="margin-bottom:0"><b>Commercial banks</b><p>' + (c.banks || '—') + '</p></div>' +
        '</div>'; }).join('')
    : '<div class="empty" style="grid-column:1/-1">Se populează la „procesează inbox".</div>';
})();
</script>
</body>
</html>
